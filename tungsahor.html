<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tung Sahur Clicker</title>
<style>
  body {
    margin: 0;
    background: #0b0b14;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  .card {
    text-align: center;
    padding: 30px;
    border: 1px solid #333;
    border-radius: 12px;
    background: #16162a;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  h1 {
    margin: 0 0 10px;
  }

  button {
    margin-top: 15px;
    padding: 12px 18px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #f0c040;
    color: #000;
    font-weight: bold;
  }

  .count {
    font-size: 28px;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="card">
  <h1>🧠 Tung Sahur Clicker</h1>
  <p>Click the button</p>
  <div class="count" id="count">0</div>
  <button onclick="clicker()">CLICK</button>
</div>

<script>
let count = 0;

function clicker() {
  count++;
  document.getElementById("count").textContent = count;
}
</script>

</body>
</html>
